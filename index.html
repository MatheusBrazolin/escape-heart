<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Tenta Me Pegar 💖</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <!-- Preview ao compartilhar o link (WhatsApp, iMessage, etc.) -->
    <meta property="og:title"       content="Tenta Me Pegar 💖">
    <meta property="og:description" content="Um joguinho especial feito com carinho 💕">
    <meta property="og:image"       content="https://escape-heart.vercel.app/preview.svg">
    <meta property="og:url"         content="https://escape-heart.vercel.app">
    <meta property="og:type"        content="website">
</head>

<body>

    <!-- Corações no fundo -->
    <div class="hearts"></div>

    <!-- Contador de tentativas -->
    <div id="contador" class="contador"></div>

    <!-- Tela inicial -->
    <div class="start-screen" id="startScreen">
        <h2>Oiii, minha Be 💖</h2>
        <p class="intro-text" id="typingText"></p>
        <button id="start">Começar 💕</button>
    </div>

    <!-- Botão fugitivo -->
    <button id="fujao">Me pega 😏</button>

    <!-- Tela de vitória -->
    <div class="winner-screen" id="winnerScreen">
        <h1 class="winner-title">Parabéns, minha Be 💖</h1>
        <!-- ALTERE: mensagem da tela de vitória -->
        <h2 class="winner-message">
            Eu preparei isso com muito carinho, pensando em cada detalhe.
        </h2>
        <button id="surpresaBtn">Ver minha surpresa 💌</button>
    </div>

    <!-- ============================================================
         SURPRESA — flui em 4 fases após a vitória
         ============================================================ -->
    <div class="surpresa-screen" id="surpresaScreen">

        <!-- Fase 1: Envelope -->
        <div class="fase" id="faseEnvelope">
            <div class="envelope-container" id="envelope">💌</div>
            <p class="dica-envelope">toque para abrir 💕</p>
        </div>

        <!-- Fase 2: Carta -->
        <div class="fase escondida" id="faseCarta">
            <div class="carta">
                <!-- ALTERE: edite o texto da carta em script.js → cartaTextoStr -->
                <p id="cartaTexto"></p>
            </div>
            <button id="verFotosBtn" class="btn-reveal">Ver as fotos 📸</button>
        </div>

        <!-- Fase 3: Fotos -->
        <div class="fase escondida" id="faseFotos">
            <div class="slideshow" id="slideshow">

                <div class="slide">
                    <!--
                        FOTO 1 — quando tiver a foto, substitua o div abaixo por:
                        <img src="foto1.jpg" class="foto-img" alt="">
                    -->
                    <div class="foto-placeholder">📸</div>
                    <!-- ALTERE: legenda da foto 1 -->
                    <p class="foto-legenda">— a legenda da sua primeira foto</p>
                </div>

                <div class="slide">
                    <!--
                        FOTO 2 — quando tiver a foto, substitua o div abaixo por:
                        <img src="foto2.jpg" class="foto-img" alt="">
                    -->
                    <div class="foto-placeholder">📸</div>
                    <!-- ALTERE: legenda da foto 2 -->
                    <p class="foto-legenda">— a legenda da sua segunda foto</p>
                </div>

                <div class="slide">
                    <!--
                        FOTO 3 — quando tiver a foto, substitua o div abaixo por:
                        <img src="foto3.jpg" class="foto-img" alt="">
                    -->
                    <div class="foto-placeholder">📸</div>
                    <!-- ALTERE: legenda da foto 3 -->
                    <p class="foto-legenda">— a legenda da sua terceira foto</p>
                </div>

            </div>
            <div class="slide-nav">
                <button class="btn-nav" id="prevFoto">&#8249;</button>
                <div class="slide-dots" id="slideDots"></div>
                <button class="btn-nav" id="nextFoto">&#8250;</button>
            </div>
            <button id="verContadorBtn" class="btn-reveal">Ver algo especial 💖</button>
        </div>

        <!-- Fase 4: Contador de dias -->
        <div class="fase escondida" id="faseContador">
            <div class="dias-wrap">
                <!-- ALTERE: mude a data de início em script.js → dataInicio -->
                <span id="diasNum" class="dias-num">0</span>
                <p class="dias-label">dias juntos 💖</p>
            </div>
            <p class="dias-sub">e que venham muitos mais 🌸</p>
            <button id="jogarDeNovoFinal">Jogar de novo 💕</button>
        </div>

    </div>

    <audio id="winSound" src="win.mp3"></audio>
    <!-- ALTERE: coloque sua música como musica.mp3 na pasta -->
    <audio id="musicaFundo" src="musica.mp3" loop></audio>

    <script src="script.js"></script>
</body>

</html>
